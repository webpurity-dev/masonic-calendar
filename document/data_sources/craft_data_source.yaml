members:
  source: "CraftData.csv"
  filter_field: "SECTION_CODE"
  filter_value: "S18t"
  fields:
    - name: "Reference"
      csv_column: "GPYB_LC_DETS_ID"
      type: "string"
    - name: "Surname"
      csv_column: "FN08"
      type: "string"
    - name: "Initials"
      csv_column: "FN07"
      type: "string"
    - name: "YearInitiated"
      csv_column: "FN01"
      type: "string"

honorary_members:
  source: "CraftData.csv"
  filter_field: "SECTION_CODE"
  filter_value: "S41t"
  fields:
    - name: "Reference"
      csv_column: "GPYB_LC_DETS_ID"
      type: "string"
    - name: "Surname"
      csv_column: "FN06"
      type: "string"
    - name: "Initials"
      csv_column: "FN05"
      type: "string"
    - name: "GrandRank"
      csv_column: "FN10"
      type: "string"
    - name: "ProvincialRank"
      csv_column: "FN11"
      type: "string"

installation_dates:
  source: "CraftData.csv"
  filter_field: "SECTION_CODE"
  filter_value: "S12"
  fields:
    - name: "LastInstallationDate"
      is_composite: true
      composite_format: "{FN02} {FN03} {FN04}"
      composite_fields:
        - "FN02"
        - "FN03"
        - "FN04"
      date_format: "d MMMM yyyy"
      type: "date"