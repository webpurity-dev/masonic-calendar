# Data source mappings for Craft Freemasonry section
# CSV files and column mappings that support craft-related data

units:
  source: "sample-units.csv"
  fields:
    - name: "Number"
      csv_column: "Number"
      type: "int"
    - name: "Name"
      csv_column: "Name"
      type: "string"
    - name: "ShortName"
      csv_column: "ShortName"
      type: "string"
    - name: "Email"
      csv_column: "Email"
      type: "string"
    - name: "Established"
      csv_column: "Established"
      type: "date"
    - name: "LastInstallationDate"
      csv_column: "LastInstallationDate"
      type: "date"

officers:
  source: "hermes-export.csv"
  filter_field: "Type"
  filter_value: "Off"
  fields:
    - name: "Reference"
      csv_column: "ConCatLu"
      type: "string"
    - name: "Name"
      csv_column: "Name"
      type: "string"
    - name: "Position"
      csv_column: "FN01"
      type: "string"
    - name: "DisplayOrder"
      csv_column: "PosNo"
      type: "int"

past_masters:
  source: "hermes-export.csv"
  filter_field: "Type"
  filter_value: "PMO"
  fields:
    - name: "Reference"
      csv_column: "ConCatLu"
      type: "string"
    - name: "Name"
      csv_column: "Name"
      type: "string"
    - name: "YearInstalled"
      csv_column: "FN01"
      type: "string"
    - name: "ProvincialRank"
      csv_column: "FN13"
      type: "string"
    - name: "RankYear"
      csv_column: "FN14"
      type: "string"
    - name: "DisplayOrder"
      csv_column: "PosNo"
      type: "int"

joining_past_masters:
  source: "hermes-export.csv"
  filter_field: "Type"
  filter_value: "PMI"
  fields:
    - name: "Reference"
      csv_column: "ConCatLu"
      type: "string"
    - name: "Name"
      csv_column: "Name"
      type: "string"
    - name: "YearInstalled"
      csv_column: "FN01"
      type: "string"
    - name: "ProvincialRank"
      csv_column: "FN12"
      type: "string"
    - name: "RankYear"
      csv_column: "FN13"
      type: "string"
    - name: "DisplayOrder"
      csv_column: "PosNo"
      type: "int"

members:
  source: "hermes-export.csv"
  filter_field: "Type"
  filter_value: "Mem"
  fields:
    - name: "Reference"
      csv_column: "ConCatLu"
      type: "string"
    - name: "Name"
      csv_column: "Name"
      type: "string"
    - name: "YearInitiated"
      csv_column: "FN01"
      type: "string"
    - name: "DisplayOrder"
      csv_column: "PosNo"
      type: "int"

honorary_members:
  source: "hermes-export.csv"
  filter_field: "Type"
  filter_value: "Hon"
  fields:
    - name: "Reference"
      csv_column: "ConCatLu"
      type: "string"
    - name: "Name"
      csv_column: "Name"
      type: "string"
    - name: "DisplayOrder"
      csv_column: "PosNo"
      type: "int"
