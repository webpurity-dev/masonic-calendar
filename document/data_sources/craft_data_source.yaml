# Data source mappings for Craft Freemasonry section
# CSV files and column mappings that support craft-related data
# v1.4 format: units_v1.5.csv + membership_v1.5.csv

units:
  source: "units_v1.6.csv"
  filter_field: "Unit Type"
  filter_value: "Craft"
  fields:
    - name: "Number"
      csv_column: "Unit No"
      type: "int"
    - name: "Name"
      csv_column: "Unit Name"
      type: "string"
    - name: "ShortName"
      csv_column: "Short Name"
      type: "string"
    - name: "SuperShortName"
      csv_column: "Super Short Name"
      type: "string"
    - name: "Warrant"
      csv_column: "Warrant"
      type: "string"
    - name: "MeetingDates"
      csv_column: "Meeting Dates"
      type: "string"
    - name: "LastInstallationDate"
      csv_column: "Last Installation"
      type: "string"
    - name: "Hall"
      csv_column: "Hall"
      type: "string"
    - name: "Location"
      csv_column: "Location"
      type: "string"
    - name: "Contact"
      csv_column: "Email"
      type: "string"

officers:
  source: "membership_v1.5.csv"
  filters:
    - filter_field: "Unit Type"
      filter_value: "Craft"
    - filter_field: "MemType"
      filter_value: "Off"
  fields:
    - name: "Reference"
      csv_column: "UniqueRef"
      type: "string"
    - name: "Name"
      csv_column: "Name"
      type: "string"
    - name: "Position"
      csv_column: "Office"
      type: "string"
    - name: "PositionNo"
      csv_column: "OffPos"
      type: "int"

past_masters:
  source: "membership_v1.5.csv"
  filters:
    - filter_field: "Unit Type"
      filter_value: "Craft"
    - filter_field: "MemType"
      filter_value: "PMO"
  fields:
    - name: "Reference"
      csv_column: "UniqueRef"
      type: "string"
    - name: "Name"
      csv_column: "Name"
      type: "string"
    - name: "YearInstalled"
      csv_column: "Installed"
      type: "string"
    - name: "ProvincialRank"
      csv_column: "Provincial Rank"
      type: "string"
    - name: "ProvincialRankYear"
      csv_column: "Date Accorded"
      type: "string"
    - name: "GrandRank"
      csv_column: "Grand Rank"
      type: "string"
    - name: "GrandRankYear"
      csv_column: "GR Date Accorded"
      type: "string"

joining_past_masters:
  source: "membership_v1.5.csv"
  filters:
    - filter_field: "Unit Type"
      filter_value: "Craft"
    - filter_field: "MemType"
      filter_value: "PMI"
  fields:
    - name: "Reference"
      csv_column: "UniqueRef"
      type: "string"
    - name: "Name"
      csv_column: "Name"
      type: "string"
    - name: "PastUnits"
      csv_column: "Join Unit"
      type: "string"
    - name: "ProvincialRank"
      csv_column: "Provincial Rank"
      type: "string"
    - name: "ProvincialRankYear"
      csv_column: "Date Accorded"
      type: "string"
    - name: "GrandRank"
      csv_column: "Grand Rank"
      type: "string"
    - name: "GrandRankYear"
      csv_column: "GR Date Accorded"
      type: "string"

members:
  source: "membership_v1.5.csv"
  filters:
    - filter_field: "Unit Type"
      filter_value: "Craft"
    - filter_field: "MemType"
      filter_value: "Mem"
  fields:
    - name: "Reference"
      csv_column: "UniqueRef"
      type: "string"
    - name: "Name"
      csv_column: "Name"
      type: "string"
    - name: "YearInitiated"
      csv_column: "Year"
      type: "string"

honorary_members:
  source: "membership_v1.5.csv"
  filters:
    - filter_field: "Unit Type"
      filter_value: "Craft"
    - filter_field: "MemType"
      filter_value: "Hon"
  fields:
    - name: "Reference"
      csv_column: "UniqueRef"
      type: "string"
    - name: "Name"
      csv_column: "Name"
      type: "string"
    - name: "GrandRank"
      csv_column: "Grand Rank"
      type: "string"
    - name: "ProvincialRank"
      csv_column: "Provincial Rank"
      type: "string"
