# Data source mappings for Meetings Calendar
# CSV file and field mappings for meeting events with recurrence rules

meetings:
  source: "unit-meetings.csv"
  calendar_start_month: 10
  fields:
    - name: "UnitType"
      csv_column: "UnitType"
      type: "string"
    - name: "Number"
      csv_column: "Number"
      type: "string"
    - name: "Title"
      csv_column: "Title"
      type: "string"
    - name: "RecurrenceType"
      csv_column: "RecurrenceType"
      type: "string"
    - name: "RecurrenceStrategy"
      csv_column: "RecurrenceStrategy"
      type: "string"
    - name: "DayOfWeek"
      csv_column: "DayOfWeek"
      type: "string"
    - name: "WeekNumber"
      csv_column: "WeekNumber"
      type: "string"
    - name: "DayNumber"
      csv_column: "DayNumber"
      type: "string"
    - name: "InstallationMonth"
      csv_column: "InstallationMonth"
      type: "string"
    - name: "StartMonth"
      csv_column: "StartMonth"
      type: "string"
    - name: "EndMonth"
      csv_column: "EndMonth"
      type: "string"
    - name: "Months"
      csv_column: "Months"
      type: "string"