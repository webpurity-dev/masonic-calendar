document:
  format: "A6"
  orientation: "portrait"

global_margins:
  page_top: 5mm
  page_bottom: 5mm
  page_left: 5mm
  page_right: 5mm

sections:
  - section_id: "cover"
    type: "static"
    template: "cover-page.html"
  
  - section_id: "master_toc"
    section_title: "Table of Contents"
    type: "toc"
    for_section: "all"
    template: "toc-page.html"

  - section_id: "craft_toc"
    section_title: "Craft Freemasonry"
    type: "toc"
    for_section: "craft"
    template: "toc-page.html"
  
  - section_id: "craft"
    section_title: "Craft Freemasonry"
    type: "data-driven"
    template: "unit-page.html"
    data_mapping: "data_sources/craft_data_source.yaml"

  - section_id: "royalarch_toc"
    section_title: "Royal Arch Masonry"
    type: "toc"
    for_section: "royalarch"
    template: "toc-page.html"
    
  - section_id: "royalarch"
    section_title: "Royal Arch Masonry"
    type: "data-driven"
    template: "unit-page.html"
    data_mapping: "data_sources/royalarch_data_source.yaml"