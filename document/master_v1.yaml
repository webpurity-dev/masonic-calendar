document:
  title: "Masonic Calendar & Directory"
  version: "1.0"
  copyright: "© 2026 Masonic Publishing Co."
  format: "A6"
  orientation: "portrait"
  
global_styling:
  fonts:
    default_family: "Helvetica"
    sizes:
      large_heading: 18pt
      section_heading: 14pt
      subsection_heading: 12pt
      body: 10pt
      small: 8pt
      tiny: 6pt
  colors:
    text_primary: "#000000"
    text_secondary: "#000000"
    links: "#000000"
    accent: "#000000"
  
global_margins:
  page_top: 5mm
  page_bottom: 5mm
  page_left: 5mm
  page_right: 5mm
  binding_edge: 15mm  # Additional margin on odd/even pages for binding
  
page_numbering:
  enabled: true
  position: footer_center
  format: "{page}"
  font_size: 6pt

# Data source definitions based on CSV_SCHEMA_v2
data_sources:
  units:
    file: "sample-units.csv"
    schema:
      - name: "ID"
        type: "guid"
        display_name: "Unit ID"
        visible: false
      - name: "Number"
        type: "int"
        display_name: "Unit Number"
      - name: "Name"
        type: "string"
        display_name: "Unit Name"
      - name: "LocationID"
        type: "guid"
        display_name: "Location ID"
        visible: false
      - name: "Email"
        type: "string"
        display_name: "Contact Email"
      - name: "Established"
        type: "date"
        display_name: "Established Date"
      - name: "LastInstallationDate"
        type: "date"
        display_name: "Last Installation"
      - name: "UnitType"
        type: "string"
        display_name: "Unit Type"
        visible: false
  
  hermes_export:
    file: "hermes-export.csv"
    record_types:
      - type: "Off"
        name: "Officers"
        fields:
          - name: "Unit"
            type: "int"
            label: "Unit Number"
          - name: "PosNo"
            type: "int"
            label: "Position Order"
          - name: "Name"
            type: "string"
            label: "Officer Name"
          - name: "FN01"
            type: "string"
            label: "Position"
      
      - type: "PMO"
        name: "Past Masters"
        fields:
          - name: "Unit"
            type: "int"
            label: "Unit Number"
          - name: "PosNo"
            type: "int"
            label: "Position Order"
          - name: "Name"
            type: "string"
            label: "Past Master Name"
          - name: "FN01"
            type: "string"
            label: "Year Installed"
          - name: "FN13"
            type: "string"
            label: "Provincial Rank"
          - name: "FN14"
            type: "string"
            label: "Rank Year"
      
      - type: "PMI"
        name: "Joining Past Masters"
        fields:
          - name: "Unit"
            type: "int"
            label: "Unit Number"
          - name: "PosNo"
            type: "int"
            label: "Position Order"
          - name: "Name"
            type: "string"
            label: "Name"
          - name: "FN01"
            type: "string"
            label: "Year Installed"
          - name: "FN12"
            type: "string"
            label: "Provincial Rank"
          - name: "FN13"
            type: "string"
            label: "Rank Year"
      
      - type: "Mem"
        name: "Members"
        fields:
          - name: "Unit"
            type: "int"
            label: "Unit Number"
          - name: "PosNo"
            type: "int"
            label: "Position Order"
          - name: "Name"
            type: "string"
            label: "Member Name"
          - name: "FN01"
            type: "string"
            label: "Year Initiated"
      
      - type: "Hon"
        name: "Honorary Members"
        fields:
          - name: "Unit"
            type: "int"
            label: "Unit Number"
          - name: "PosNo"
            type: "int"
            label: "Position Order"
          - name: "Name"
            type: "string"
            label: "Honorary Member Name"

# CSV Column Mappings - Map logical field names to actual CSV columns
csv_column_mappings:
  units:
    # No mapping needed if logical names match CSV headers exactly
    overrides:
      Established: "Established"
      LastInstallationDate: "LastInstallationDate"
  
  hermes_export:
    # Field name -> CSV column name
    Unit: "Unit"
    PosNo: "PosNo"
    Name: "Name"
    FN01: "FN01"
    FN12: "FN12"
    FN13: "FN13"
    FN14: "FN14"
    Type: "Type"

# Type coercion rules for date parsing
type_coercion:
  date_formats:
    - "yyyy-MM-dd"
    - "dd/MM/yyyy"
    - "d MMMM yyyy"
    - "d'st' MMMM yyyy"
    - "d'nd' MMMM yyyy"
    - "d'rd' MMMM yyyy"
    - "d'th' MMMM yyyy"
  
  string_to_int_nullable: true  # Allow empty strings for int fields
  parse_year_as_string: true    # Keep year values as strings (FN01 for PMI, PMO)

# Default page type styling (can be overridden in sections)
default_page_types:
  toc:
    heading:
      font_family: "Helvetica"
      font_size: 14pt
      font_weight: bold
      text_alignment: center
      margin_bottom: 20
    items:
      font_family: "Helvetica"
      font_size: 10pt
      line_height: 1.4
      text_alignment: left
      margin_vertical: 8
      spacing_between_unit_and_page: 30
    links:
      color: "#0066cc"
      underline: true
    layout:
      padding: 10
      columns: 2  # Unit name | Page number
  
  content:
    general:
      font_family: "Helvetica"
      background_color: "white"
    page_breaks:
      after_toc: true
      between_units: true
    page_numbering:
      enabled: true
      position: footer_center
      font_size: 6pt

sections:
  - section_id: "cover"
    type: "static"
    template: "cover-page.html"
    styling:
      margins:
        top: 10mm
        bottom: 10mm
        left: 10mm
        right: 10mm
    
  - section_id: "craft"
    include: "section-craft.yaml"
    template: "unit-page.html"
    
  - section_id: "royalarch"
    include: "section-royal-arch.yaml"
    template: "unit-page.html"