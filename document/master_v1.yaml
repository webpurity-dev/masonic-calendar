document:
  format: "A6"              # Will infer 105mm 148mm
  orientation: "portrait"
  global_styling:
    fonts:
      default_family: "Helvetica, Arial, sans-serif"
    footer:
      font_family: "Arial, sans-serif"
      font_size: "6pt"
      text_align: "center"

# Paged.js CSS @page margins - used for actual PDF/print rendering
# These are applied directly to the @page CSS rules
# NOTE: Paged.js applies a 6mm bleed/margin by default around all pages.
#       The margins specified here are ADDITIONAL to that default bleed.

page_margins:
  #page_size: "105mm 148mm" # A6 format - configurable, or omit to infer from document.format
  right_page:               # Odd pages (Recto)
    top: 0mm
    bottom: 10mm            # Space for page number in footer
    left: 10mm              # Inner margin (gutter)
    right: 0mm              # Outer margin
  left_page:                # Even pages (Verso)
    top: 0mm
    bottom: 10mm            # Space for page number in footer
    left: 0mm               # Outer margin
    right: 10mm             # Inner margin (gutter)
  first_page:               # Cover page - no page number, no margins
    top: 0mm
    bottom: 0mm
    left: 0mm
    right: 0mm

sections:
  - section_id: "cover"
    type: "static"
    template: "cover-page.html"
  
  - section_id: "master_toc"
    section_title: "Table of Contents"
    type: "toc"
    for_section: "all"
    template: "toc-page.html"
    reset_page_counter: true

  - section_id: "master_foreword"
    section_title: "Foreword"
    type: "static"
    template: "foreword-page.html"

  - section_id: "meetings_calendar"
    section_title: "Craft & Royal Arch Meeting Dates"
    type: "meetings-calendar"
    template: "meetings-calendar-page.html"
    data_mapping: "data_sources/meetings_data_source.yaml"

  - section_id: "craft_toc"
    section_title: "Craft Lodges in numerical order"
    type: "toc"
    for_section: "craft_units"
    template: "toc-page.html"
  
  - section_id: "craft_units"
    section_title: "Craft Lodges in numerical order"
    type: "data-driven"
    template: "unit-page.html"
    data_mapping: "data_sources/craft_data_source.yaml"
    hide_from_parent_toc: true

  - section_id: "royalarch_foreword"
    section_title: "Royal Arch Masonry Foreword"
    type: "static"
    template: "ra-foreword-page.html"

  - section_id: "royalarch_toc"
    section_title: "Royal Arch Chapters in numerical order"
    type: "toc"
    for_section: "royalarch_units"
    template: "toc-page.html"

  - section_id: "royalarch_units"
    section_title: "Royal Arch Chapters in numerical order"
    type: "data-driven"
    template: "unit-page.html"
    data_mapping: "data_sources/royalarch_data_source.yaml"
    hide_from_parent_toc: true

  - section_id: "mark_foreword"
    section_title: "Mark Masonry Foreword"
    type: "static"
    template: "mark-foreword-page.html"

  - section_id: "mark_toc"
    section_title: "Mark Lodges in numerical order"
    type: "toc"
    for_section: "mark_units"
    template: "toc-page.html"

  - section_id: "mark_units"
    section_title: "Mark Lodges in numerical order"
    type: "data-driven"
    template: "unit-page.html"
    data_mapping: "data_sources/mark_data_source.yaml"
    hide_from_parent_toc: true
    
  - section_id: "ram_foreword"
    section_title: "R.A.M Masonry Foreword"
    type: "static"
    template: "ram-foreword-page.html"

  - section_id: "ram_toc"
    section_title: "R.A.M Lodges in numerical order"
    type: "toc"
    for_section: "ram_units"
    template: "toc-page.html"

  - section_id: "ram_units"
    section_title: "R.A.M Lodges in numerical order"
    type: "data-driven"
    template: "unit-page.html"
    data_mapping: "data_sources/ram_data_source.yaml"
    hide_from_parent_toc: true