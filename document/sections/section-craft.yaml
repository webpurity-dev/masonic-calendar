section_name: "Craft Freemasonry"
unit_type: "Craft"
data_source: "hermes_export.csv"

# Unit page structure - what data to display and in what order
unit_page_structure:
  header:
    - field: "Number"
      label: "Unit Number"
      format: "bold"
    - field: "Name"
      label: "Unit Name"
      format: "bold"
    - field: "Established"
      label: "Established"
      format: "date"
    - field: "LastInstallationDate"
      label: "Last Installation"
      format: "date"
    - field: "Email"
      label: "Contact"
      format: "email_link"
  
  sections:
    - record_type: "Off"
      name: "Officers"
      visible: true
      fields:
        - field: "FN01"
          label: "Position"
        - field: "Name"
          label: "Name"
    
    - record_type: "PMO"
      name: "Past Masters"
      visible: true
      fields:
        - field: "Name"
          label: "Name"
        - field: "FN01"
          label: "Year"
        - field: "FN13"
          label: "Rank"
        - field: "FN14"
          label: "Rank Year"
    
    - record_type: "PMI"
      name: "Joining Past Masters"
      visible: true
      fields:
        - field: "Name"
          label: "Name"
        - field: "FN01"
          label: "Year"
        - field: "FN12"
          label: "Rank"
        - field: "FN13"
          label: "Rank Year"
    
    - record_type: "Mem"
      name: "Members"
      visible: true
      max_display: 20
      fields:
        - field: "Name"
          label: "Name"
        - field: "FN01"
          label: "Year Initiated"
    
    - record_type: "Hon"
      name: "Honorary Members"
      visible: true
      fields:
        - field: "Name"
          label: "Name"

pages:
  - page_type: "toc"
    title: "Craft Table of Contents"
    styling:
      heading:
        text: "Craft Freemasonry"
      # Inherits all other styling from document-master.yaml default_page_types.toc
  
  - page_type: "content"
    title: "Craft Units"
    repeat_for: "each_unit"
    template: "templates/unit-page.html"
    data_source: "hermes_export.csv"
    data_filters:
      unit_type: "Craft"
    pages_per_unit: 3
    # Inherits all styling from document-master.yaml default_page_types.content