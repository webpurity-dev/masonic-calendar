<div class="toc-page">
    {{ if toc_by_section }}        
        {{ for section in toc_by_section }}
    <div class="toc-section">
        {{ if section.items && section.items.size > 0 }}
            <div class="toc-section-title">{{ section.section_title }}</div>
            {{ for item in section.items }}
            <div class="toc-item">
                <a href="#{{ item.anchor_id }}"><strong>[{{ item.unit_number }}]</strong> - {{ item.unit_name }}</a>
                <!-- Page number automatically inserted by Paged.js target-counter() via CSS -->
            </div>
            {{ end }}
        {{ else }}
        <div class="toc-item">
            <a href="#section_{{ section.section_id }}">{{ section.section_title }}</a>
            <!-- Page number automatically inserted by Paged.js target-counter() via CSS -->
        </div>
        {{ end }}
    </div>
        {{ end }}
    {{ end }}
</div>
