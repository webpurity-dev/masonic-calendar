<div style="text-align: left; padding: 20px; font-family: Helvetica; font-size: 10pt;">
    <h1 style="font-size: 18pt; margin: 0 0 20px 0; font-weight: bold;">Table of Contents</h1>
    
    {{ if toc_by_section }}
        {{ for section in toc_by_section }}
    <div style="margin-bottom: 16px;">
        <h2 style="font-size: 14pt; margin: 0 0 8px 0; font-weight: bold;">{{ section.section_title }}</h2>
            {{ for item in section.items }}
            <div style="font-size: 10pt; margin: 4px 0; display: flex; justify-content: space-between;">
                <a href="#{{ item.anchor_id }}" style="color: black; text-decoration: none;">{{ item.unit_name }} ({{ item.unit_number }})</a>
                <span style="margin-left: 10px;">{{ item.page_number }}</span>
            </div>
            {{ end }}
    </div>
        {{ end }}
    {{ end }}
</div>
